<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIXEL QUEST</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <div id="game-menu">
        <h1 class="menu-title">PIXEL QUEST</h1>
        <button id="start-btn" class="menu-btn">START GAME</button>
        <button id="credits-btn" class="menu-btn">CREDITS</button>
        <a href="https://buy.stripe.com/9B6eVfd9E6OC3sr7cEaAw03" target="_blank" rel="noopener noreferrer" class="menu-btn" style="text-decoration: none; color: #fff; display: flex; align-items: center; gap: 15px;">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" style="color: #f43f5e;"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg>
          SUPPORT
        </a>
      </div>

      <div style="position: relative;">
        <canvas id="game" width="640" height="360"></canvas>
      </div>

      <section class="quests">
        <div class="quest-box">
          <h2>QUEST LOG</h2>
          <ul id="quest-list" class="quest-list"></ul>
        </div>
        <div class="quest-box">
          <h2>GUIDE: <span id="hud-guide" style="color: #fff;">...</span></h2>
          <p id="hud-guide-note" class="guide-note">...</p>
        </div>
      </section>
      
      <p class="help">MOVE: WASD / ARROWS</p>
    </main>
    <script type="module" src="./src/main.js?v=20260307clean"></script>
  </body>
</html>
